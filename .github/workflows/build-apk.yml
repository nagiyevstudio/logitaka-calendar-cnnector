name: Build Logitaka Calendar Connector APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Build Standard Release APK
        run: ./gradlew --no-configuration-cache --no-daemon app:assembleStandardRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: logitaka-calendar-connector
          path: app/build/outputs/apk/standard/release/*.apk
