name: Build Logitaka Calendar Connector APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      - name: Generate Debug Keystore
        run: keytool -genkey -v -keystore ${{ github.workspace }}/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Standard Release APK
        run: ./gradlew --no-configuration-cache --no-daemon app:assembleStandardRelease > build_log.txt 2>&1

      - name: Upload Build Log Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-log
          path: build_log.txt

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: logitaka-calendar-connector
          path: app/build/outputs/apk/standard/release/*.apk
